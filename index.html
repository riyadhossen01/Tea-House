<!DOCTYPE html>
<html lang="en">
<head>

    <title>TEA HOUSE</title>
    <link rel="shortcut icon" href="images/banner.png" type="image/x-icon">
    <!-- Google Font CDM -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<!-- Font Awesome CDM -->
 <script src="https://kit.fontawesome.com/31770858ab.js" crossorigin="anonymous"></script>
 <!-- Tailwind CDM -->

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            clifford: '#da373d',
          }

      }
    }
  </script>

<body>
    <!-- Main Content -->
     <Main class="max-w-screen-xl mx-auto px-16 lg:px-28">

             <div>

             </div>
            <!-- Image Content -->
              <div class="relative">

                    <img class="w-full" src="images/banner.png" alt="">

                  <div class="absolute flex items-center bg-white shadow-lg px-2 py-2 md:py-10 lg:py-4 rounded-lg top-20 md:top-80 left-30 lg:left-24">

                     <div><i class="fa-solid fa-star text-3xl text-amber-500"></i></div>

                      <div class="ml-2">
